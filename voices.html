<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Voices by Artist — RIN. Midnight Lounge</title>
  <meta name="description" content="RIN.の楽曲を歌ったアーティストたち。あなたの声で、この曲に新しい表情を。" />
  <meta property="og:title" content="Voices by Artist — RIN." />
  <meta property="og:description" content="こちらの楽曲は、自由に歌うことができます。" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />

  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0CQLR1WLX4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0CQLR1WLX4');
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=DM+Serif+Display:ital@0;1&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:           #0E0C0A;
      --surface:      #161410;
      --surface-hi:   #1E1A15;
      --cream:        #EDE8DC;
      --ink:          #EDE8DC;
      --ink-light:    #C0B8AC;
      --ink-muted:    #5C564E;
      --accent:       #C89A3A;
      --accent-light: #E0B860;
      --accent-pale:  rgba(200,154,58,0.10);
      --line:         rgba(237,232,220,0.08);
      --font-serif-jp: 'Shippori Mincho', 'Noto Serif JP', serif;
      --font-display: 'DM Serif Display', serif;
      --font-sans-jp: 'Zen Kaku Gothic New', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-serif-jp);
      overflow-x: hidden;
    }

    /* ── NOISE ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.05'/%3E%3C/svg%3E");
      pointer-events: none; z-index: 9999; opacity: 0.6;
    }

    /* ── NAV ── */
    .site-nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 2.5rem;
      background: linear-gradient(to bottom, rgba(14,12,10,0.95) 70%, transparent);
    }

    .nav-logo {
      font-family: var(--font-display); font-style: italic;
      font-size: 1.4rem; color: var(--accent); text-decoration: none;
      letter-spacing: 0.05em;
      text-shadow: 0 0 30px rgba(200,154,58,0.4);
    }

    .nav-back {
      font-family: var(--font-sans-jp); font-size: 0.65rem; font-weight: 300;
      letter-spacing: 0.25em; color: var(--ink-muted); text-decoration: none;
      transition: color 0.2s;
    }
    .nav-back:hover { color: var(--accent); }

    /* ── HERO ── */
    .v-hero {
      min-height: 56vh;
      display: flex; flex-direction: column;
      justify-content: flex-end; align-items: center; text-align: center;
      padding: 9rem 2rem 5rem;
      border-bottom: 1px solid var(--line);
      position: relative; overflow: hidden;
    }

    .v-hero::before {
      content: '';
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 79px,
        var(--line) 79px, var(--line) 80px
      );
      opacity: 0.4; pointer-events: none;
    }

    .v-hero::after {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(ellipse 70% 55% at 50% 60%, rgba(200,154,58,0.07) 0%, transparent 70%);
      pointer-events: none;
    }

    .v-hero-content {
      position: relative; z-index: 1;
      opacity: 0; transform: translateY(24px);
      animation: fadeUp 1.1s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }

    .v-hero-label {
      font-family: var(--font-sans-jp); font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.5em; color: var(--accent); text-transform: uppercase;
      margin-bottom: 1rem;
    }

    .v-hero-title {
      font-family: var(--font-display); font-style: italic;
      font-size: clamp(3rem, 10vw, 6rem);
      color: var(--ink); line-height: 0.95;
      text-shadow: 0 0 80px rgba(200,154,58,0.2);
      margin-bottom: 0.15rem;
    }

    .v-hero-subtitle {
      font-family: var(--font-display); font-style: italic;
      font-size: clamp(1rem, 2.5vw, 1.5rem);
      color: var(--accent); letter-spacing: 0.06em;
      margin-bottom: 2rem;
    }

    .divider-line {
      width: 48px; height: 1px;
      background: linear-gradient(to right, transparent, var(--accent), transparent);
      margin: 0 auto 2rem;
    }

    .v-hero-desc {
      font-family: var(--font-sans-jp); font-size: 0.78rem; font-weight: 300;
      color: var(--ink-light); line-height: 2.3; letter-spacing: 0.08em;
      max-width: 440px; margin: 0 auto;
    }

    /* ── CONTENT WRAPPER ── */
    .voices-content {
      max-width: 860px; margin: 0 auto;
      padding: 0 2rem 8rem;
    }

    /* ── VOCAL GROUP ── */
    .vocal-group {
      padding: 4.5rem 0;
      border-bottom: 1px solid var(--line);
      opacity: 0; transform: translateY(32px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .vocal-group.visible { opacity: 1; transform: translateY(0); }

    .vocal-header {
      margin-bottom: 2.5rem;
    }

    .vocal-label {
      font-family: var(--font-sans-jp); font-size: 0.55rem; font-weight: 500;
      letter-spacing: 0.55em; color: var(--accent); text-transform: uppercase;
      margin-bottom: 0.5rem;
    }

    .vocal-name {
      font-family: var(--font-serif-jp); font-weight: 500;
      font-size: clamp(1.6rem, 4vw, 2.4rem);
      color: var(--ink); letter-spacing: 0.04em;
      line-height: 1.2; margin-bottom: 0.8rem;
    }

    .vocal-profile {
      font-family: var(--font-sans-jp); font-size: 0.92rem; font-weight: 300;
      color: var(--ink-light); line-height: 2; letter-spacing: 0.05em;
      max-width: 520px;
    }

    /* ── VOICE CARDS GRID ── */
    .voice-cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .voice-card {
      background: var(--surface);
      display: flex; flex-direction: column;
      position: relative; overflow: hidden;
      transition: background 0.3s;
    }
    .voice-card:hover { background: var(--surface-hi); }

    /* left gold accent on hover */
    .voice-card::after {
      content: '';
      position: absolute; left: 0; top: 0; bottom: 0; width: 2px;
      background: linear-gradient(to bottom, transparent, var(--accent), transparent);
      transform: scaleY(0); transform-origin: center;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
    }
    .voice-card:hover::after { transform: scaleY(1); }

    .voice-card.featured {
      background: linear-gradient(160deg, rgba(200,154,58,0.06) 0%, var(--surface) 55%);
      outline: 1px solid rgba(200,154,58,0.2);
    }

    /* thumbnail */
    .voice-card-thumb {
      width: 100%; aspect-ratio: 16/9; overflow: hidden;
      background: var(--surface-hi);
      flex-shrink: 0;
    }
    .voice-card-thumb img {
      width: 100%; height: 100%; object-fit: cover; display: block;
      filter: brightness(0.85) saturate(0.85);
      transition: filter 0.3s, transform 0.45s cubic-bezier(0.16,1,0.3,1);
    }
    .voice-card:hover .voice-card-thumb img {
      filter: brightness(1) saturate(1);
      transform: scale(1.04);
    }

    /* body */
    .voice-card-body {
      padding: 1.2rem 1.4rem 1.5rem;
      display: flex; flex-direction: column; gap: 0.55rem;
      flex: 1; position: relative; z-index: 1;
    }

    /* badges */
    .badge-row {
      display: flex; gap: 5px; flex-wrap: wrap; min-height: 1.1rem;
    }
    .badge {
      font-family: var(--font-sans-jp); font-size: 0.5rem; font-weight: 500;
      letter-spacing: 0.12em; text-transform: uppercase;
      padding: 2px 6px; border: 1px solid;
    }
    .badge-featured { color: var(--accent); border-color: rgba(200,154,58,0.45); background: rgba(200,154,58,0.08); }
    .badge-first    { color: var(--ink-muted); border-color: rgba(237,232,220,0.14); }

    .voice-card-song {
      font-family: var(--font-serif-jp); font-weight: 500;
      font-size: 0.95rem; color: var(--ink);
      letter-spacing: 0.04em; line-height: 1.4;
      transition: color 0.2s;
    }
    .voice-card:hover .voice-card-song { color: var(--accent-light); }

    .voice-card-date {
      font-family: var(--font-sans-jp); font-size: 0.58rem; font-weight: 300;
      color: var(--ink-muted); letter-spacing: 0.12em;
    }

    .voice-card-btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; margin-top: 0.4rem;
      font-family: var(--font-sans-jp); font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.15em; text-decoration: none;
      background: var(--accent); color: var(--bg);
      width: fit-content;
      transition: background 0.2s;
    }
    .voice-card-btn:hover { background: var(--accent-light); }

    .play-tri {
      width: 0; height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 6px solid currentColor;
      flex-shrink: 0;
    }

    /* ── EMPTY / LOADING ── */
    .v-empty {
      padding: 6rem 2rem; text-align: center;
      font-family: var(--font-sans-jp); font-size: 0.78rem;
      color: var(--ink-muted); letter-spacing: 0.22em;
    }

    /* ── GUIDELINES INVITE ── */
    .v-guidelines {
      padding: 4rem 0;
      text-align: center;
      border-bottom: 1px solid var(--line);
      opacity: 0; transform: translateY(32px);
      transition: opacity 0.85s ease, transform 0.85s ease;
    }
    .v-guidelines.visible { opacity: 1; transform: translateY(0); }

    .v-guidelines-text {
      font-family: var(--font-sans-jp); font-size: 0.78rem; font-weight: 300;
      color: var(--ink-muted); letter-spacing: 0.12em; margin-bottom: 1.4rem;
      line-height: 2;
    }

    .v-guidelines-link {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 24px;
      font-family: var(--font-sans-jp); font-size: 0.68rem; font-weight: 500;
      letter-spacing: 0.2em; text-decoration: none;
      color: var(--accent); border: 1px solid rgba(200,154,58,0.35);
      transition: background 0.25s, color 0.25s;
    }
    .v-guidelines-link:hover { background: var(--accent); color: var(--bg); }

    /* ── FOOTER ── */
    footer {
      padding: 4rem 2rem; text-align: center;
      border-top: 1px solid var(--line);
    }
    .footer-name {
      font-family: var(--font-display); font-style: italic;
      font-size: 2.2rem; color: var(--accent); margin-bottom: 0.25rem;
      text-shadow: 0 0 40px rgba(200,154,58,0.25);
    }
    .footer-venue {
      font-family: var(--font-display); font-style: italic;
      font-size: 0.85rem; color: var(--ink-muted); letter-spacing: 0.1em; margin-bottom: 1rem;
    }
    .footer-copy {
      font-family: var(--font-sans-jp); font-size: 0.6rem; font-weight: 300;
      letter-spacing: 0.25em; color: var(--ink-muted);
    }

    @media (max-width: 600px) {
      .voice-cards-grid { grid-template-columns: 1fr 1fr; }
      .v-hero { min-height: 44vh; }
      .site-nav { padding: 1rem 1.5rem; }
    }
    @media (max-width: 380px) {
      .voice-cards-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<nav class="site-nav">
  <a class="nav-logo" href="index.html">RIN.</a>
  <a class="nav-back" href="index.html">← Midnight Lounge</a>
</nav>

<section class="v-hero">
  <div class="v-hero-content">
    <div class="v-hero-label">Cover Voices</div>
    <div class="v-hero-title">Voices</div>
    <div class="v-hero-subtitle">by Artist</div>
    <div class="divider-line"></div>
    <p class="v-hero-desc">
      こちらの楽曲は、自由に歌うことができます。<br>
      すでにいくつかの声が、この曲に新しい表情を与えてくれました。<br>
      次は、あなたの番です。
    </p>
  </div>
</section>

<div class="voices-content" id="voices-content">
  <div class="v-empty">読み込み中...</div>
</div>

<footer>
  <div class="footer-name">RIN.</div>
  <div class="footer-venue">Midnight Lounge</div>
  <p class="footer-copy">© 2026 RIN. · All rights reserved.</p>
</footer>

<script>
  /* ── Fade-in observer ── */
  const observer = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
    });
  }, { threshold: 0.08 });

  /* ── Main load ── */
  async function loadVoices() {
    const container = document.getElementById('voices-content');
    try {
      const res = await fetch('./voices.json?t=' + Date.now());
      if (!res.ok) throw new Error('fetch failed');
      const data = await res.json();
      render(data.voices || []);
    } catch {
      container.innerHTML = '<div class="v-empty">読み込みに失敗しました</div>';
    }
  }

  function render(voices) {
    const container = document.getElementById('voices-content');
    /* voices = [ { vocal_name, profile, featured, status, songs:[{song_title,media_url,thumbnail,published_date,first_voice}] } ] */
    const published = voices.filter(v => v.status === 'published' && (v.songs||[]).length > 0);

    if (published.length === 0) {
      container.innerHTML = `<div class="v-empty">まだ投稿がありません</div>${guidelinesBlock()}`;
      observeAll();
      return;
    }

    /* Sort artists: featured first */
    published.sort((a, b) => {
      if (!!a.featured !== !!b.featured) return a.featured ? -1 : 1;
      return 0;
    });

    container.innerHTML = published.map(artist => renderGroup(artist)).join('') + guidelinesBlock();
    observeAll();
  }

  function renderGroup(artist) {
    /* Sort songs within artist: first_voice first → newest */
    const songs = [...(artist.songs || [])].sort((a, b) => {
      if (!!a.first_voice !== !!b.first_voice) return a.first_voice ? -1 : 1;
      return new Date(b.published_date || 0) - new Date(a.published_date || 0);
    });

    const cards = songs.map(s => {
      const thumb = s.thumbnail || ytThumb(s.media_url);
      return `
        <div class="voice-card${artist.featured ? ' featured' : ''}">
          ${thumb ? `<div class="voice-card-thumb"><img src="${esc(thumb)}" alt="${esc(s.song_title)}" loading="lazy" onerror="this.parentElement.style.display='none'" /></div>` : ''}
          <div class="voice-card-body">
            <div class="badge-row">
              ${artist.featured  ? '<span class="badge badge-featured">★ Featured</span>' : ''}
              ${s.first_voice    ? '<span class="badge badge-first">First Voice</span>'   : ''}
            </div>
            <div class="voice-card-song">${esc(s.song_title)}</div>
            ${s.published_date ? `<div class="voice-card-date">${fmtDate(s.published_date)}</div>` : ''}
            <a class="voice-card-btn" href="${esc(s.media_url)}" target="_blank" rel="noopener">
              <span class="play-tri"></span><span>聴く</span>
            </a>
          </div>
        </div>`;
    }).join('');

    return `
      <div class="vocal-group">
        <div class="vocal-header">
          <div class="vocal-label">Vocal</div>
          <div class="vocal-name">${esc(artist.vocal_name)}</div>
          ${artist.profile ? `<p class="vocal-profile">${esc(artist.profile).replace(/\n/g,'<br>')}</p>` : ''}
        </div>
        <div class="voice-cards-grid">${cards}</div>
      </div>`;
  }

  function guidelinesBlock() {
    return `
      <div class="v-guidelines">
        <p class="v-guidelines-text">
          あなたも歌ってみませんか？<br>
          楽曲はすべてカバーOK。詳細はガイドラインをご確認ください。
        </p>
        <a class="v-guidelines-link" href="guidelines.html">▶ 楽曲利用ガイドライン</a>
      </div>`;
  }

  function observeAll() {
    document.querySelectorAll('.vocal-group, .v-guidelines').forEach(el => observer.observe(el));
  }

  /* ── Helpers ── */
  function ytThumb(url) {
    const m = String(url || '').match(/(?:youtu\.be\/|youtube\.com\/(?:shorts\/|watch\?v=|embed\/))([A-Za-z0-9_-]{11})/);
    return m ? `https://img.youtube.com/vi/${m[1]}/hqdefault.jpg` : '';
  }

  function fmtDate(str) {
    const d = new Date(str);
    if (isNaN(d)) return '';
    return d.toLocaleDateString('ja-JP', { year: 'numeric', month: 'long', day: 'numeric' });
  }

  function esc(str) {
    return String(str)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;')
      .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
  }

  loadVoices();
</script>
</body>
</html>
