<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RIN.</title>
  <meta name="description" content="RIN. official music page" />
  <meta property="og:title" content="RIN." />
  <meta property="og:description" content="RIN. official music page" />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:site" content="@RIN_796" />

  <!-- Google Analytics ─ 測定IDをご自身のものに書き換えてください -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-0CQLR1WLX4"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-0CQLR1WLX4');

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@300;400;500&family=Shippori+Mincho:wght@400;500;600&family=DM+Serif+Display:ital@0;1&family=Zen+Kaku+Gothic+New:wght@300;400;500&display=swap" rel="stylesheet" />

  <style>
    :root {
      --cream: #F5F0E8;
      --ink: #1A1714;
      --ink-light: #4A4540;
      --ink-muted: #8A837A;
      --accent: #B8622A;
      --accent-light: #D4855A;
      --accent-pale: #F0DDD0;
      --line: rgba(26,23,20,0.12);
      --font-serif-jp: 'Shippori Mincho', 'Noto Serif JP', serif;
      --font-display: 'DM Serif Display', serif;
      --font-sans-jp: 'Zen Kaku Gothic New', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--cream);
      color: var(--ink);
      font-family: var(--font-serif-jp);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.4;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 4rem 2rem;
      position: relative;
      border-bottom: 1px solid var(--line);
      overflow: hidden;
    }

    .hero-bg-line {
      position: absolute;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent, transparent 79px,
        var(--line) 79px, var(--line) 80px
      );
      opacity: 0.4;
    }

    .hero-content {
      position: relative;
      z-index: 1;
      opacity: 0;
      transform: translateY(24px);
      animation: fadeUp 1.2s cubic-bezier(0.16,1,0.3,1) 0.2s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .artist-label {
      font-family: var(--font-display);
      font-size: clamp(4rem, 14vw, 10rem);
      font-style: italic;
      color: var(--ink);
      letter-spacing: -0.02em;
      line-height: 0.9;
      margin-bottom: 0.6rem;
    }

    .divider-line {
      width: 60px;
      height: 1px;
      background: var(--accent);
      margin: 1.5rem auto;
    }

    .hero-tagline {
      font-family: var(--font-sans-jp);
      font-size: 0.75rem;
      font-weight: 300;
      color: var(--ink-muted);
      letter-spacing: 0.3em;
      text-transform: uppercase;
    }

    /* ── HERO GIF ── */
    .hero-gif-wrap {
      margin: 2rem auto 0;
      position: relative;
      width: 180px;
    }

    .hero-gif-wrap::before,
    .hero-gif-wrap::after {
      content: '';
      position: absolute;
      background: var(--accent);
    }

    .hero-gif-wrap::before {
      top: -8px; left: -8px;
      right: 8px; bottom: 8px;
      z-index: 0;
    }

    .hero-gif-wrap::after {
      top: 8px; left: 8px;
      right: -8px; bottom: -8px;
      z-index: 0;
      opacity: 0.25;
    }

    .hero-gif {
      display: block;
      width: 100%;
      height: auto;
      position: relative;
      z-index: 1;
      filter: sepia(10%) contrast(1.04);
    }

    .scroll-hint {
      position: absolute;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      font-family: var(--font-sans-jp);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.25em;
      color: var(--ink-muted);
      animation: scrollPulse 2s ease-in-out infinite;
    }

    .scroll-hint-line {
      width: 1px;
      height: 40px;
      background: linear-gradient(to bottom, var(--ink-muted), transparent);
    }

    @keyframes scrollPulse {
      0%, 100% { opacity: 0.5; transform: translateX(-50%) translateY(0); }
      50% { opacity: 1; transform: translateX(-50%) translateY(6px); }
    }

    /* ── SECTIONS ── */
    .section {
      max-width: 760px;
      margin: 0 auto;
      padding: 5rem 2rem;
      border-bottom: 1px solid var(--line);
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }

    .section.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .section-label {
      font-family: var(--font-sans-jp);
      font-size: 0.65rem;
      font-weight: 500;
      letter-spacing: 0.35em;
      color: var(--accent);
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--accent-pale);
    }

    /* ── MUSIC GRID ── */
    .music-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .song-card {
      background: var(--cream);
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      transition: background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .song-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.4s cubic-bezier(0.16,1,0.3,1);
    }

    .song-card:hover::before { transform: scaleY(1); }

    .song-card-inner {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
    }

    .song-card-index {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 0.75rem;
      color: var(--ink-muted);
      transition: color 0.25s;
    }

    .song-card:hover .song-card-index { color: var(--accent-light); }

    .song-card-title {
      font-family: var(--font-serif-jp);
      font-weight: 500;
      font-size: clamp(1.2rem, 2.5vw, 1.5rem);
      color: var(--ink);
      letter-spacing: 0.05em;
      line-height: 1.3;
      transition: color 0.25s;
    }

    .song-card:hover .song-card-title { color: var(--cream); }

    .song-card-subtitle {
      font-family: var(--font-sans-jp);
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--ink-muted);
      letter-spacing: 0.2em;
      transition: color 0.25s;
    }

    .song-card:hover .song-card-subtitle { color: rgba(245,240,232,0.5); }

    .song-card-actions {
      display: flex;
      gap: 8px;
      margin-top: auto;
      padding-top: 0.5rem;
    }

    .btn-small {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      font-family: var(--font-sans-jp);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      text-decoration: none;
      cursor: pointer;
      border: none;
      transition: background 0.25s, color 0.25s;
    }

    .btn-small.primary {
      background: var(--ink);
      color: var(--cream);
    }

    .btn-small.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--line);
    }

    .song-card:hover .btn-small.primary {
      background: var(--accent);
    }

    .song-card:hover .btn-small.secondary {
      color: var(--cream);
      border-color: rgba(245,240,232,0.3);
    }

    .play-triangle {
      width: 0; height: 0;
      border-top: 4px solid transparent;
      border-bottom: 4px solid transparent;
      border-left: 7px solid currentColor;
    }

    /* ── SNS ── */
    .sns-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1px;
      background: var(--line);
      border: 1px solid var(--line);
    }

    .sns-item {
      background: var(--cream);
      padding: 2rem 1rem;
      text-align: center;
      text-decoration: none;
      display: block;
      transition: background 0.25s;
      position: relative;
      overflow: hidden;
    }

    .sns-item::before {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--ink);
      transform: scaleY(0);
      transform-origin: bottom;
      transition: transform 0.3s cubic-bezier(0.16,1,0.3,1);
    }

    .sns-item:hover::before { transform: scaleY(1); }
    .sns-item:hover .sns-item-icon,
    .sns-item:hover .sns-item-name,
    .sns-item:hover .sns-item-handle { color: var(--cream); }

    .sns-item-icon {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 1.5rem;
      color: var(--ink);
      display: block;
      margin-bottom: 0.5rem;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
    }

    .sns-item-name {
      font-family: var(--font-sans-jp);
      font-size: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.15em;
      color: var(--ink);
      display: block;
      margin-bottom: 0.3rem;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
    }

    .sns-item-handle {
      font-family: var(--font-sans-jp);
      font-size: 0.65rem;
      font-weight: 300;
      color: var(--ink-muted);
      display: block;
      position: relative;
      z-index: 1;
      transition: color 0.25s;
    }

    /* ── FOOTER ── */
    footer {
      padding: 3rem 2rem;
      text-align: center;
    }

    .footer-name {
      font-family: var(--font-display);
      font-style: italic;
      font-size: 2rem;
      color: var(--ink);
      margin-bottom: 0.5rem;
    }

    .footer-copy {
      font-family: var(--font-sans-jp);
      font-size: 0.65rem;
      font-weight: 300;
      letter-spacing: 0.2em;
      color: var(--ink-muted);
    }

    /* ── LOADING ── */
    .loading-placeholder {
      text-align: center;
      padding: 3rem;
      font-family: var(--font-sans-jp);
      font-size: 0.75rem;
      color: var(--ink-muted);
      letter-spacing: 0.2em;
    }

    @media (max-width: 480px) {
      .sns-grid { grid-template-columns: 1fr; }
      .music-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="hero-bg-line"></div>
    <div class="hero-content">
      <div class="artist-label">RIN.</div>
      <div class="divider-line"></div>
      <div class="hero-tagline">Music · 2026</div>
      <div class="hero-gif-wrap">
        <img class="hero-gif" src="hero.gif" alt="RIN." loading="lazy" />
      </div>
    </div>
    <div class="scroll-hint">
      <div class="scroll-hint-line"></div>
      scroll
    </div>
  </section>

  <section class="section" id="music">
    <div class="section-label">Music</div>
    <div class="music-grid" id="music-grid">
      <div class="loading-placeholder">Loading...</div>
    </div>
  </section>

  <section class="section" id="follow">
    <div class="section-label">Follow RIN.</div>
    <div class="sns-grid">
      <a class="sns-item" href="https://x.com/RIN_796" target="_blank" rel="noopener">
        <span class="sns-item-icon">X</span>
        <span class="sns-item-name">X · Twitter</span>
        <span class="sns-item-handle">@RIN_796</span>
      </a>
      <a class="sns-item" href="https://www.tiktok.com/@rin_796monster" target="_blank" rel="noopener">
        <span class="sns-item-icon">Tk</span>
        <span class="sns-item-name">TikTok</span>
        <span class="sns-item-handle">@rin_796monster</span>
      </a>
    </div>
  </section>

  <footer>
    <div class="footer-name">RIN.</div>
    <p class="footer-copy">© 2026 RIN. · All rights reserved.</p>
  </footer>

  <script>
    async function loadSongs() {
      const grid = document.getElementById('music-grid');
      try {
        const res = await fetch('./songs.json');
        if (!res.ok) throw new Error('fetch failed');
        const data = await res.json();
        renderSongs(data.songs);
      } catch {
        grid.innerHTML = '<div class="loading-placeholder">曲の読み込みに失敗しました</div>';
      }
    }

    function renderSongs(songs) {
      const grid = document.getElementById('music-grid');
      if (!songs || songs.length === 0) {
        grid.innerHTML = '<div class="loading-placeholder">曲はまだありません</div>';
        return;
      }
      grid.innerHTML = songs.map((song, i) => `
        <div class="song-card">
          <div class="song-card-inner">
            <div class="song-card-index">0${i + 1}</div>
            <div class="song-card-title">${escHtml(song.title)}</div>
            <div class="song-card-subtitle">${escHtml(song.subtitle || '')}</div>
            <div class="song-card-actions">
              <a class="btn-small primary" href="${escHtml(song.youtubeUrl)}" target="_blank" rel="noopener">
                <span class="play-triangle"></span>
                <span>聴く</span>
              </a>
              <a class="btn-small secondary" href="song.html?id=${escHtml(song.id)}">詳しく</a>
            </div>
          </div>
        </div>
      `).join('');
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Scroll fade-in
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
      });
    }, { threshold: 0.1 });
    document.querySelectorAll('.section').forEach(s => observer.observe(s));

    loadSongs();
  </script>

</body>
</html>
